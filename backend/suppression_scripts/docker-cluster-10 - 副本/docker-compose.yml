version: '3.3'

networks:
  dht_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

services:
  node-1:
    image: dht-node:latest
    container_name: node-1
    hostname: node-1
    networks:
      - dht_net
    entrypoint: ["python3", "main.py"]
    environment:
      - PORT=8000
      - NODE_ID_HEX=00623457

  attacker:
    image: dht-node:latest
    container_name: attacker
    networks:
      - dht_net
    entrypoint: ["sleep", "infinity"]
    # 挂载最新的攻击脚本和验证脚本
    volumes:
      - ./sybil.py:/app/sybil.py
      - ./verify_sybil_attack.py:/app/verify_sybil_attack.py
    # 确保目标先启动
    depends_on: [node-1] 

  node-2:
    image: dht-node:latest 
    container_name: node-2
    networks:
      - dht_net
    entrypoint: ["python3", "main.py"]
    depends_on: [node-1]
    # 挂载验证脚本
    volumes:
      - ./verify_sybil_attack.py:/app/verify_sybil_attack.py
    environment:
      - PORT=8000
      - NODE_ID_HEX=00547832
      - BOOTSTRAP_HOST=node-1

  node-3:
